name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore AuroraMic.slnx

    - name: Build Server
      run: dotnet build AuroraMic.Server.Desktop/AuroraMic.Server.Desktop.fsproj -c Release --no-restore

    - name: Build Tests
      run: dotnet build AuroraMic.Tests/AuroraMic.Tests.fsproj -c Release --no-restore

    - name: Run Tests
      run: dotnet test AuroraMic.Tests/AuroraMic.Tests.fsproj -c Release --no-build --verbosity normal

    - name: Run Tests with Coverage
      run: dotnet test AuroraMic.Tests/AuroraMic.Tests.fsproj -c Release --collect:"XPlat Code Coverage" --results-directory ./coverage

    - name: Install ReportGenerator
      run: dotnet tool install -g dotnet-reportgenerator-globaltool 2>/dev/null || true

    - name: Check Coverage
      run: |
        REPORT=$(find ./coverage -name "coverage.cobertura.xml" | head -1)
        if [ -n "$REPORT" ]; then
          reportgenerator "-reports:$REPORT" "-targetdir:./report" "-reporttype:TextSummary" 2>/dev/null
          COVERAGE=$(grep "Line Coverage" ./report/Summary.txt | awk '{print $3}' | tr -d '%')
          echo "Line coverage: ${COVERAGE}%"
          if [ "$(echo "$COVERAGE < 100" | bc)" -eq 1 ]; then
            echo "Coverage ${COVERAGE}% is below 100% threshold"
            exit 1
          fi
        else
          echo "No coverage report found, skipping check"
        fi

    - name: Publish Server
      run: dotnet publish AuroraMic.Server.Desktop/AuroraMic.Server.Desktop.fsproj -c Release -o ./publish/server

    - name: Upload Server Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AuroraMic-Server-Linux
        path: ./publish/server/

  build-android:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    - name: Restore dependencies
      run: dotnet restore AuroraMic.Client.Android/AuroraMic.Client.Android.fsproj

    - name: Build Android
      run: dotnet build AuroraMic.Client.Android/AuroraMic.Client.Android.fsproj -c Release --no-restore

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: AuroraMic-Client-Android
        path: AuroraMic.Client.Android/bin/Release/net10.0-android/*.apk
